name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Aura IPA
    runs-on: macos-15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🛠 Select Xcode 26 (Swift 6.2+)
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          xcodebuild -version
          swift --version

      - name: 📋 Show Schemes
        working-directory: ios
        run: |
          xcodebuild -list -project Aura.xcodeproj 2>&1 || true

      - name: 🔨 Build Archive (no signing)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild archive \
            -project Aura.xcodeproj \
            -scheme Aura \
            -archivePath build/Aura.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee build.log

      - name: 📦 Export IPA
        working-directory: ios
        run: |
          mkdir -p build/ipa-output/Payload
          
          # Try multiple possible .app locations
          APP_PATH=""
          for candidate in \
            "build/Aura.xcarchive/Products/Applications/Aura.app" \
            "build/Aura.xcarchive/Products/Applications/Aura-Aura.app"; do
            if [ -d "$candidate" ]; then
              APP_PATH="$candidate"
              break
            fi
          done
          
          # Fallback: find any .app
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build/Aura.xcarchive -name "*.app" -type d 2>/dev/null | head -1)
          fi
          
          if [ -n "$APP_PATH" ]; then
            echo "Found .app at: $APP_PATH"
            cp -r "$APP_PATH" build/ipa-output/Payload/
            cd build/ipa-output
            zip -r Aura.ipa Payload/
            echo "✅ IPA created successfully!"
            ls -lh Aura.ipa
          else
            echo "⚠️ No .app found. Dumping archive structure:"
            find build/Aura.xcarchive -type d 2>/dev/null | head -50 || echo "No archive dir at all"
            echo ""
            echo "❌ Cannot create IPA without .app bundle"
            exit 1
          fi

      - name: 📤 Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aura-iOS-IPA
          path: ios/build/ipa-output/Aura.ipa
          retention-days: 30

      - name: 📤 Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ios/build.log
          retention-days: 7

      - name: 📋 Build Summary
        if: always()
        working-directory: ios
        run: |
          echo "## 🔨 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f build/ipa-output/Aura.ipa ]; then
            SIZE=$(du -h build/ipa-output/Aura.ipa | cut -f1)
            echo "✅ **IPA built successfully!** Size: ${SIZE}" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ IPA was not produced. Check build logs." >> $GITHUB_STEP_SUMMARY
          fi
