name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Aura IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -e
          XCODE_APP=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_APP" ]; then
            echo "No Xcode app found on runner"
            ls /Applications
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Show Schemes
        working-directory: ios
        run: xcodebuild -list -project Aura.xcodeproj

      - name: Build Archive (no signing)
        working-directory: ios
        run: |
          set -eo pipefail
          xcodebuild archive \
            -project Aura.xcodeproj \
            -scheme Aura \
            -archivePath build/Aura.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee build.log

      - name: Export IPA
        working-directory: ios
        run: |
          set -e
          mkdir -p build/ipa-output/Payload

          APP_PATH=""
          for candidate in \
            "build/Aura.xcarchive/Products/Applications/Aura.app" \
            "build/Aura.xcarchive/Products/Applications/Aura-Aura.app"; do
            if [ -d "$candidate" ]; then
              APP_PATH="$candidate"
              break
            fi
          done

          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build/Aura.xcarchive -name "*.app" -type d 2>/dev/null | head -1)
          fi

          if [ -n "$APP_PATH" ]; then
            cp -R "$APP_PATH" build/ipa-output/Payload/
            cd build/ipa-output
            zip -r Aura.ipa Payload/
            ls -lh Aura.ipa
          else
            echo "No .app found in archive"
            find build/Aura.xcarchive -type d 2>/dev/null | head -50 || true
            exit 1
          fi

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aura-iOS-IPA
          path: ios/build/ipa-output/Aura.ipa
          retention-days: 30

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ios/build.log
          retention-days: 7

      - name: Build Summary
        if: always()
        working-directory: ios
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f build/ipa-output/Aura.ipa ]; then
            SIZE=$(du -h build/ipa-output/Aura.ipa | cut -f1)
            echo "✅ IPA built successfully! Size: ${SIZE}" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ IPA was not produced. Check build logs." >> $GITHUB_STEP_SUMMARY
          fi
